name: Validate Vector Configs

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'File to validate (e.g. vector/panos.yaml). Leave empty to validate all.'
        required: false
        default: ''
  push:
    paths:
      - 'vector/**.yaml'
  pull_request:
    paths:
      - 'vector/**.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Get changed Vector YAML files
        id: changed-files
        if: github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v46
        with:
          files: 'vector/*.yaml'

      - name: Install Vector
        run: |
          bash -c "$(curl -L https://setup.vector.dev)"
          sudo apt-get install -y vector
          sudo chmod 777 /var/lib/vector
          vector --version

      - name: Validate configs
        working-directory: vector
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.file }}" ]; then
              # Strip optional vector/ prefix so the user can type either form
              files=$(echo "${{ github.event.inputs.file }}" | sed 's|vector/||g')
            else
              files=$(ls *.yaml)
            fi
          else
            # changed-files returns paths like vector/foo.yaml — strip the prefix
            files=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | sed 's|vector/||g' | tr '\n' ' ')
          fi

          if [ -z "$files" ]; then
            echo "No files to validate."
            exit 0
          fi

          failed=0
          for file in $files; do
            # Skip partial configs that are not standalone pipelines
            case "$file" in
              vector.yaml|iana.yaml)
                echo "    SKIP: $file (partial config, no sources)"
                continue
                ;;
            esac
            # Files that reference the iana enrichment table must include iana.yaml
            case "$file" in
              fortigate.yaml|panos.yaml)
                extra="iana.yaml"
                ;;
              *)
                extra=""
                ;;
            esac
            echo "==> Validating $file"
            if vector validate --skip-healthchecks "$file" $extra; then
              echo "    PASS: $file"
            else
              echo "    FAIL: $file"
              failed=1
            fi
          done
          exit $failed
